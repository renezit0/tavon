name: Build & Publish APK — Tavon Cardápio

on:
  push:
    tags:
      - 'cardapio-android-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão do APK (ex: 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node ────────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Java ────────────────────────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── Android SDK ─────────────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          sdkmanager "build-tools;34.0.0" "platforms;android-34" --sdk_root=$ANDROID_SDK_ROOT

      # ── Install deps ─────────────────────────────────────────────────────────
      - name: Install root dependencies
        run: npm ci

      # ── Build web (Cardápio) ─────────────────────────────────────────────────
      - name: Build shared package
        run: npm run build -w @restaurant/shared

      - name: Build web app (cardapio module)
        run: npm run build -w @restaurant/web
        env:
          VITE_MODULE: cardapio

      # ── Capacitor sync ───────────────────────────────────────────────────────
      - name: Install Capacitor deps
        working-directory: apps/mobile
        run: npm ci

      - name: Capacitor sync Android
        working-directory: apps/mobile
        run: |
          npx cap add android 2>/dev/null || true
          npx cap sync android

      # ── Determine version ────────────────────────────────────────────────────
      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#cardapio-android-v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building APK version: $VERSION"

      # ── Update versionName in build.gradle ──────────────────────────────────
      - name: Set version in build.gradle
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          BUILD_FILE="apps/mobile/android/app/build.gradle"
          if [ -f "$BUILD_FILE" ]; then
            sed -i "s/versionName \".*\"/versionName \"$VERSION\"/" "$BUILD_FILE"
            # Increment versionCode using run number
            sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/" "$BUILD_FILE"
          fi

      # ── Build APK ────────────────────────────────────────────────────────────
      - name: Build release APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease --no-daemon

      # ── Sign APK ─────────────────────────────────────────────────────────────
      - name: Sign APK
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > /tmp/keystore.jks
          BUILD_TOOLS="$ANDROID_SDK_ROOT/build-tools/34.0.0"
          APK_IN="apps/mobile/android/app/build/outputs/apk/release/app-release-unsigned.apk"
          APK_OUT="apps/mobile/android/app/build/outputs/apk/release/app-release.apk"

          "$BUILD_TOOLS/zipalign" -v 4 "$APK_IN" "$APK_OUT" || cp "$APK_IN" "$APK_OUT"

          "$BUILD_TOOLS/apksigner" sign \
            --ks /tmp/keystore.jks \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass pass:"$ANDROID_STORE_PASSWORD" \
            --key-pass pass:"$ANDROID_KEY_PASSWORD" \
            --out "$APK_OUT" \
            "$APK_OUT"

      # ── Rename APK ───────────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          APK_DIR="apps/mobile/android/app/build/outputs/apk/release"

          # Find whichever APK was produced
          APK_FILE=$(find "$APK_DIR" -name "*.apk" | head -1)
          if [ -n "$APK_FILE" ]; then
            cp "$APK_FILE" "Tavon-Cardapio-$VERSION.apk"
            echo "APK_PATH=Tavon-Cardapio-$VERSION.apk" >> $GITHUB_ENV
          fi

      # ── Upload artifact ──────────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tavon-Cardapio-APK
          path: "Tavon-Cardapio-*.apk"
          retention-days: 30

      # ── Create GitHub Release ────────────────────────────────────────────────
      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Tavon Cardápio Android v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Tavon Cardápio — Android APK

            Versão: `${{ steps.version.outputs.VERSION }}`

            ### Instalação
            1. Baixe o arquivo `.apk` abaixo
            2. No Android, vá em **Configurações → Segurança → Fontes desconhecidas** e habilite
            3. Abra o arquivo `.apk` e instale

            > Requer Android 7.0 (API 24) ou superior.
          files: "Tavon-Cardapio-*.apk"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Workflow dispatch: upload only (no release tag) ───────────────────────
      - name: Summary
        run: |
          echo "## ✅ APK gerado com sucesso" >> $GITHUB_STEP_SUMMARY
          echo "**Versão:** ${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "**Arquivo:** Tavon-Cardapio-${{ steps.version.outputs.VERSION }}.apk" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Baixe o APK na aba **Artifacts** desta execução." >> $GITHUB_STEP_SUMMARY
